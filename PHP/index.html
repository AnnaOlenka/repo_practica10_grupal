<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 09 | Registro PHP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #edf2f8;
            color: #22303f;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h2 {
            margin-top: 0;
            color: #1b365e;
        }
        form {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(34, 48, 63, 0.12);
            border: 1px solid rgba(34, 48, 63, 0.08);
        }
        label {
            display: block;
            margin-bottom: 16px;
            font-weight: 600;
        }
        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px 14px;
            margin-top: 8px;
            border: 1px solid #c8d2e0;
            border-radius: 10px;
            background: #f9fbff;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background: #1e5bbf;
            color: white;
            border: none;
            padding: 14px 0;
            margin-top: 8px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
        }
        button:hover {
            background: #16468f;
        }
    </style>
</head>
<body>
    <form action="registro.php" method="POST">
        <h2>Formulario de Contacto - PHP</h2>

        <label>
            Nombre:
            <input type="text" name="nombre" required>
        </label>

        <label>
            Correo:
            <input type="email" name="correo" required>
        </label>

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
